ssa:
  db_path: data/energy.db

  # источник данных
  agg_table_name: agg_30min
  metric_name: active_power_avg

  # таблицы результатов
  runs_table_name: ssa_runs
  cluster_series_table_name: ssa_cluster_series

  # как часто сервис проверяет возможность нового расчёта
  poll_interval: 300.0

  # окно анализа
  history_points: 336        # 7 дней × 48 точек/сутки
  window_length: 48          # 1 день × 48 точек/сутки

  # параметры кластеризации (строго как в старом подходе)
  fs: 48                     # частота дискретизации для spectral features
  n_clusters: 3
  random_state: 42
  n_init: 10

  # строгая логика старого подхода
  max_components: 30
  trend_component: 0

  # считать ли TOTAL = сумма мощностей всех счётчиков
  include_total: true

  # автосоздание таблиц
  auto_init_db: true