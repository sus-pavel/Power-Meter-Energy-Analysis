<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="layout">
    <header class="page-header">
      <div class="page-header__left">
        <h1 class="page-title">{{ title }}</h1>
        <div class="page-subtitle">Система поддержки управления спросом на электроэнергию</div>
      </div>
      <div class="page-header__right">
        {% block header_controls %}{% endblock %}
      </div>
    </header>

    <nav class="top-nav">
      <a href="/overview" class="{% if page_name == 'overview' %}active{% endif %}">Обзор</a>
      <a href="/drpi" class="{% if page_name == 'drpi' %}active{% endif %}">DRPI</a>
      <a href="/history" class="{% if page_name == 'history' %}active{% endif %}">Поток данных</a>
      <a href="/ssa" class="{% if page_name == 'ssa' %}active{% endif %}">SSA-анализ</a>
    </nav>

    <main class="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
