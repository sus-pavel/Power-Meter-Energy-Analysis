{% extends "base.html" %}

{% block header_controls %}
<div class="controls-row">
  <select id="meter-select" class="control-select">
    {% for option in meter_options %}
    <option value="{{ option.value }}" {% if option.value == defaults.source_id %}selected{% endif %}>{{ option.label }}</option>
    {% endfor %}
  </select>

  <button id="mode-online-btn" class="control-btn active">Сейчас / Online</button>

  <select id="year-select" class="control-select">
    <option value="">Год</option>
    {% for year in year_options %}
    <option value="{{ year }}">{{ year }}</option>
    {% endfor %}
  </select>

  <select id="month-select" class="control-select">
    <option value="">Месяц</option>
    {% for month in month_options %}
    <option value="{{ month }}">{{ "%02d"|format(month) }}</option>
    {% endfor %}
  </select>
</div>
{% endblock %}

{% block content %}
<div id="drpi-root"
     data-default-mode="{{ defaults.mode }}"
     data-default-source-id="{{ defaults.source_id }}"
     data-default-year="{{ defaults.year or '' }}"
     data-default-month="{{ defaults.month or '' }}">

  <section class="cards-grid cards-grid--3">
    <div class="card metric-card">
      <div class="card-title">Текущий DRPI</div>
      <div id="drpi-current-value" class="metric-value">—</div>
    </div>

    <div class="card metric-card">
      <div class="card-title">Предпочтительные DR дни</div>
      <div id="drpi-best-days" class="metric-value metric-value--small">—</div>
    </div>

    <div class="card metric-card">
      <div class="card-title">DRPI min-max за 24 часа</div>
      <div id="drpi-min-max" class="metric-value metric-value--small">—</div>
    </div>
  </section>

  <section class="drpi-main-grid">
    <div class="card">
      <div class="card-title">DRPI во времени</div>
      <canvas id="drpi-history-chart" class="main-chart"></canvas>
    </div>

    <div class="right-side">
      <div class="cards-grid cards-grid--3 compact">
        <div class="card metric-card">
          <div class="card-title">F1</div>
          <div id="drpi-f1-value" class="metric-value">—</div>
          <canvas id="drpi-f1-sparkline" class="sparkline-canvas"></canvas>
        </div>

        <div class="card metric-card">
          <div class="card-title">F2</div>
          <div id="drpi-f2-value" class="metric-value">—</div>
          <canvas id="drpi-f2-sparkline" class="sparkline-canvas"></canvas>
        </div>

        <div class="card metric-card">
          <div class="card-title">F3</div>
          <div id="drpi-f3-value" class="metric-value">—</div>
          <canvas id="drpi-f3-sparkline" class="sparkline-canvas"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Компоненты индекса</div>
        <canvas id="drpi-components-chart" class="main-chart"></canvas>
      </div>
    </div>
  </section>
</div>

<script src="/static/js/drpi.js"></script>
{% endblock %}
